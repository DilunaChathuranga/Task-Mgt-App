<div>
    <button (click)="onSelectUser()"> <!--Event Binding / change detection-->
        <!-- <img [src]="'assets/users/'+selectedUser.avatar" [alt]="selectedUser.name" />  Method 1 with Property Binding-->
        <img [src]="imagePath" [alt]="selectedUser.name"/> <!--Method 2 with Property Binding more cleaner approach--> <!-- imagePath is a getter so we can use it as a property instaed of using as a method -->
        <!-- <img src="{{imagePath}}" alt="{{selectedUser.name}}"/> Method 3 with String Interpolation-->
        <span>{{selectedUser.name}}</span> <!--String interpolation-->
    </button>
</div>
