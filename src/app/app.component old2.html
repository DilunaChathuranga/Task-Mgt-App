<app-header></app-header>
<main>
    <ul id="users">
        <li *ngFor="let user of users">
            <app-user [id]="user.id" [avatar]="user.avatar" [name]="user.name" (select)="onSelectUser($event)"></app-user> <!--Thgis $event special avriable which use to hold emitted value-->
        </li>
    </ul>
        <app-tasks *ngIf="selectedUser; else fallback"  [name]="selectedUser.name" ></app-tasks>
        <ng-template #fallback>
            <p id="fallback">Please select a user to see their tasks !</p>
        </ng-template>
</main>
